<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
<defs><style>.cls-1{fill:#81d4ff;}.cls-2{fill:#adc2df;}.cls-3{fill:#c8e8f8;}</style></defs>
<!-- book shadow -->
<rect x="12" y="12" width="182" height="260" rx="14" class="cls-2"/>
<!-- passport cover -->
<rect x="8" y="8" width="182" height="260" rx="14" class="cls-1"/>
<!-- spine strip -->
<rect x="8" y="8" width="10" height="260" rx="5" class="cls-2"/>
<!-- inner page -->
<rect x="22" y="20" width="160" height="236" rx="9" class="cls-3"/>
<!-- decorative frame border (outer cls-2, inner cls-3) -->
<rect x="30" y="28" width="144" height="220" rx="6" class="cls-2"/>
<rect x="34" y="32" width="136" height="212" rx="4" class="cls-3"/>
<!-- photo box -->
<rect x="118" y="42" width="46" height="58" rx="5" class="cls-2"/>
<!-- head silhouette -->
<circle cx="141" cy="62" r="11" class="cls-3"/>
<!-- body silhouette (dome arc) -->
<path d="M120,100 C120,82 141,76 141,76 C141,76 162,82 162,100 Z" class="cls-3"/>
<!-- name data lines -->
<rect x="42" y="48" width="66" height="7" rx="3" class="cls-2"/>
<rect x="42" y="63" width="52" height="7" rx="3" class="cls-2"/>
<rect x="42" y="78" width="60" height="7" rx="3" class="cls-2"/>
<!-- section separator -->
<rect x="40" y="114" width="124" height="3" rx="1" class="cls-2"/>
<!-- compass outer ring -->
<circle cx="102" cy="162" r="40" class="cls-2"/>
<!-- compass inner fill -->
<circle cx="102" cy="162" r="32" class="cls-3"/>
<!-- N arrow (up, cls-1) -->
<polygon points="102,122 96,152 108,152" class="cls-1"/>
<!-- S arrow (down, cls-1) -->
<polygon points="102,202 96,172 108,172" class="cls-1"/>
<!-- E arrow (right, cls-2) -->
<polygon points="142,162 112,155 112,169" class="cls-2"/>
<!-- W arrow (left, cls-2) -->
<polygon points="62,162 92,155 92,169" class="cls-2"/>
<!-- compass center -->
<circle cx="102" cy="162" r="14" class="cls-1"/>
<circle cx="102" cy="162" r="8" class="cls-3"/>
<!-- MRZ lines -->
<rect x="34" y="222" width="136" height="7" rx="3" class="cls-2"/>
<rect x="34" y="236" width="136" height="7" rx="3" class="cls-2"/>
</svg>
